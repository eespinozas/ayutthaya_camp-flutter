# SonarCloud Configuration for Ayutthaya Camp
# https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

# ========================================
# PROJECT IDENTIFICATION
# ========================================

# Replace with your actual SonarCloud organization key
sonar.organization=eespinozas

# Unique project identifier (usually repository name)
sonar.projectKey=eespinozas_ayutthaya_camp-flutter

# Project name displayed in SonarCloud UI
sonar.projectName=Ayutthaya Camp

# Project version (can be overridden by CI/CD)
sonar.projectVersion=1.0.0

# ========================================
# SOURCE CODE PATHS
# ========================================

# Source directories
sonar.sources=lib

# Test directories
sonar.tests=test

# Exclude patterns
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.config.dart,**/*.gen.dart,**/generated/**,**/*.pb.dart,**/*.pbenum.dart,**/*.pbgrpc.dart,**/*.pbjson.dart,**/*.pbserver.dart,**/l10n/**,**/generated_plugin_registrant.dart

# Test exclusions
sonar.test.exclusions=**/*_test.dart

# ========================================
# COVERAGE CONFIGURATION
# ========================================

# Dart/Flutter coverage format is LCOV
sonar.dart.coverage.reportPaths=coverage/lcov.info

# Coverage exclusions (same as source exclusions)
sonar.coverage.exclusions=**/*.g.dart,**/*.freezed.dart,**/*.config.dart,**/*.gen.dart,**/generated/**,**/*.pb.dart,**/*.pbenum.dart,**/*.pbgrpc.dart,**/*.pbjson.dart,**/*.pbserver.dart,**/l10n/**,**/generated_plugin_registrant.dart

# ========================================
# LANGUAGE SETTINGS
# ========================================

# Primary language
sonar.language=dart

# Encoding
sonar.sourceEncoding=UTF-8

# ========================================
# ANALYSIS SETTINGS
# ========================================

# SCM provider
sonar.scm.provider=git

# Disable automatic detection of source files encoding
sonar.scm.disabled=false

# Pull request decoration (GitHub)
sonar.pullrequest.github.summary_comment=true

# ========================================
# QUALITY GATE
# ========================================

# Fail the build if quality gate fails
sonar.qualitygate.wait=false

# ========================================
# ADDITIONAL SETTINGS
# ========================================

# Link to source code
sonar.links.homepage=https://github.com/eespinozas/ayutthaya_camp-flutter
sonar.links.ci=https://github.com/eespinozas/ayutthaya_camp-flutter/actions
sonar.links.scm=https://github.com/eespinozas/ayutthaya_camp-flutter
sonar.links.issue=https://github.com/eespinozas/ayutthaya_camp-flutter/issues

# Verbose logging (disable in production)
# sonar.verbose=true
