name: Promote to Production

# Promueve a producción el binario Android YA construido y probado:
# el AAB del track alpha (prueba cerrada) -> production, sin recompilar.
#
# iOS NO va aquí: lo maneja appstore.yml (mismo trigger de push a prd),
# que envía el último build de TestFlight a revisión con las release
# notes de ios/fastlane/release_notes.txt.
#
# Flujo completo:
#   1. release.yml construye y sube a alpha (Android) + TestFlight (iOS)
#   2. Se prueba en beta cerrada / TestFlight
#   3. Merge de main a prd: este workflow promueve Android y appstore.yml
#      envía iOS — jamás se recompila para producción.

on:
  push:
    branches:
      - prd
  workflow_dispatch:
    inputs:
      rollout:
        description: 'Rollout Android (0.1 = 10%, 1.0 = 100%)'
        required: false
        type: string
        default: '1.0'

jobs:
  promote-android:
    name: Promote Android (alpha → production)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Fastlane
        run: gem install fastlane

      - name: Promote alpha build to production
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          SUPPLY_PACKAGE_NAME: com.ayutthaya.ayutthaya_camp
          SUPPLY_ROLLOUT: ${{ github.event.inputs.rollout || '1.0' }}
        run: fastlane android promote_to_production
