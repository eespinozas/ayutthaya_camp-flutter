name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plataforma a publicar'
        required: false
        type: choice
        default: 'ios'
        options:
          - ios
          - android
          - both
      version:
        description: 'Versión Android (e.g., 1.2.3). iOS la ignora: usa pubspec + TestFlight.'
        required: false
        type: string
      play_track:
        description: 'Google Play track'
        required: false
        type: choice
        default: 'internal'
        options:
          - internal
          - alpha
          - beta
          - production

# Igual que en ci.yml: versión pinneada, jamás 'stable' como flutter-version.
env:
  FLUTTER_VERSION: '3.41.7'

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      play_track: ${{ steps.inputs.outputs.play_track }}
      platform: ${{ steps.inputs.outputs.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version (solo Android)
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          # Version code Android desde el conteo de commits.
          # iOS NO usa esto: el lane beta numera desde TestFlight.
          VERSION_CODE=$(git rev-list --count HEAD)

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Set deployment targets
        id: inputs
        run: |
          PLAY_TRACK="${{ github.event.inputs.play_track || 'internal' }}"
          PLATFORM="${{ github.event.inputs.platform || 'both' }}"

          echo "play_track=${PLAY_TRACK}" >> $GITHUB_OUTPUT
          echo "platform=${PLATFORM}" >> $GITHUB_OUTPUT

  release-android:
    name: Release Android
    runs-on: ubuntu-latest
    needs: prepare
    if: contains(fromJSON('["android","both"]'), needs.prepare.outputs.platform)
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Fastlane
        run: gem install fastlane

      - name: Update version in pubspec.yaml
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION_CODE="${{ needs.prepare.outputs.version_code }}"
          sed -i "s/^version:.*/version: ${VERSION}+${VERSION_CODE}/" pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build Android App Bundle
        run: |
          flutter build appbundle \
            --release \
            --build-number=${{ needs.prepare.outputs.version_code }} \
            --build-name=${{ needs.prepare.outputs.version }}

      - name: Upload to Google Play
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          SUPPLY_PACKAGE_NAME: com.ayutthaya.ayutthaya_camp
          SUPPLY_TRACK: ${{ needs.prepare.outputs.play_track }}
          SUPPLY_AAB: build/app/outputs/bundle/release/app-release.aab
        run: |
          fastlane supply \
            --aab $SUPPLY_AAB \
            --track $SUPPLY_TRACK \
            --json_key_data "$SUPPLY_JSON_KEY_DATA" \
            --package_name $SUPPLY_PACKAGE_NAME \
            --skip_upload_apk \
            --skip_upload_metadata \
            --skip_upload_images \
            --skip_upload_screenshots

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ needs.prepare.outputs.version }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ---------------------------------------------------------------------------
  # iOS -> TestFlight con el MISMO lane `beta` que se usa en local:
  #   - match en modo readonly (certs/perfiles desde el repo privado)
  #   - App Store Connect API Key (sin Apple ID / 2FA)
  #   - build number = último build en TestFlight + 1 (fuente de verdad)
  # El lane detecta CI y omite el commit/tag/push del bump de versión.
  #
  # Secretos requeridos (Settings > Secrets and variables > Actions):
  #   ASC_KEY_ID                     ID de la API key de App Store Connect
  #   ASC_ISSUER_ID                  Issuer ID (App Store Connect > Keys)
  #   ASC_KEY_CONTENT                El .p8 codificado en base64
  #   MATCH_PASSWORD                 Passphrase del repo de certificados
  #   MATCH_GIT_BASIC_AUTHORIZATION  base64 de "usuario:PAT" con read sobre
  #                                  eespinozas/ayutthaya-certificates
  #   KEYCHAIN_PASSWORD              Cualquier string fuerte (keychain temporal)
  # ---------------------------------------------------------------------------
  release-ios:
    name: Release iOS (TestFlight)
    runs-on: macos-15
    needs: prepare
    if: contains(fromJSON('["ios","both"]'), needs.prepare.outputs.platform)
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Fastlane
        run: |
          gem install fastlane
          fastlane --version

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_KEY_CONTENT }}" | base64 -d \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Fastlane beta (build + upload TestFlight)
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: /Users/runner/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: fastlane beta

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-testflight-ipa
          path: ios/*.ipa
          retention-days: 30
          if-no-files-found: warn
